# =============================================================================
# CineWorld Nginx Config for Phase 3 - Docker Deployment (Production Server)
# =============================================================================
# File: /etc/nginx/sites-available/cineworld
# Symlink: /etc/nginx/sites-enabled/cineworld
#
# This config maintains Nginx from Phase 2 but updates upstream targets
# from localhost systemd services → localhost Docker containers
# =============================================================================

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# --- HTTPS Server Block ---
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # --- SSL Configuration (Let's Encrypt - managed by Certbot) ---
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Proxy to Frontend Container (port 3000) ---
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- API: Catalog Service (Docker container port 8001) ---
    location /api/catalog/ {
        proxy_pass http://localhost:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: OTP Service (Docker container port 8002) ---
    location /api/otp/ {
        proxy_pass http://localhost:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: Identity Service (Docker container port 8003) ---
    location /api/identity/ {
        proxy_pass http://localhost:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: Booking Service (Docker container port 8004) ---
    location /api/booking/ {
        proxy_pass http://localhost:8004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: Payment Service (Docker container port 8005) ---
    location /api/payment/ {
        proxy_pass http://localhost:8005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: Redemption Service (Docker container port 8006) ---
    location /api/redemption/ {
        proxy_pass http://localhost:8006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- API: Management Service (Docker container port 8007) ---
    location /api/management/ {
        proxy_pass http://localhost:8007/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- File uploads ---
    location /uploads/ {
        alias /opt/cineworld/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Static assets caching ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
    }
}

# =============================================================================
# Installation Instructions (Ubuntu Server)
# =============================================================================
#
# 1. Copy this file to server:
#    sudo cp cineworld-docker.conf /etc/nginx/sites-available/cineworld
#
# 2. Replace YOUR_DOMAIN with your actual domain:
#    sudo sed -i 's/YOUR_DOMAIN/yourdomain.com/g' /etc/nginx/sites-available/cineworld
#
# 3. Create symlink:
#    sudo ln -sf /etc/nginx/sites-available/cineworld /etc/nginx/sites-enabled/
#
# 4. Remove default config:
#    sudo rm /etc/nginx/sites-enabled/default
#
# 5. Test configuration:
#    sudo nginx -t
#
# 6. Reload Nginx:
#    sudo systemctl reload nginx
#
# 7. Start Docker containers:
#    docker-compose up -d
#
# 8. Test HTTPS:
#    curl -I https://yourdomain.com
#
# =============================================================================
