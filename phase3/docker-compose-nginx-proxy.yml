version: '3.8'

# =============================================================================
# Docker Compose for Nginx Reverse Proxy with HTTPS (Local Testing)
# =============================================================================
# This adds an Nginx reverse proxy container with SSL for local HTTPS testing
# Run this AFTER the main docker-compose.yml
# =============================================================================

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: movie_nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx config
      - ./nginx-https-local.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - moviebookingsystem2_default
    restart: always
    depends_on:
      - frontend

  # Reference to existing services (no need to redefine them)
  # This compose file extends the main docker-compose.yml

networks:
  moviebookingsystem2_default:
    external: true

# =============================================================================
# Usage:
# 1. Generate SSL certificate: .\generate-ssl-cert.ps1
# 2. Update nginx-https-local.conf SSL paths to: /etc/nginx/ssl/localhost.crt
# 3. Start the proxy: docker-compose -f docker-compose-nginx-proxy.yml up -d
# 4. Access: https://localhost
# =============================================================================
