# =============================================================================
# CineWorld Nginx Reverse Proxy Configuration
# =============================================================================
# File: /etc/nginx/sites-available/cineworld
# Symlink: /etc/nginx/sites-enabled/cineworld
#
# Architecture:
#   Client → Nginx (80/443) → Microservices (127.0.0.1:8001-8007)
#                            → Frontend static files (/opt/cineworld/frontend)
# =============================================================================

# --- Upstream definitions for microservices ---
upstream catalog_service {
    server 127.0.0.1:8001;
}

upstream otp_service {
    server 127.0.0.1:8002;
}

upstream identity_service {
    server 127.0.0.1:8003;
}

upstream booking_service {
    server 127.0.0.1:8004;
}

upstream payment_service {
    server 127.0.0.1:8005;
}

upstream redemption_service {
    server 127.0.0.1:8006;
}

upstream management_service {
    server 127.0.0.1:8007;
}

# --- HTTP → HTTPS redirect (uncomment after SSL is configured) ---
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

# --- Main server block ---
server {
    listen 80;
    # listen 443 ssl;  # Uncomment after Certbot configures SSL
    server_name YOUR_DOMAIN;

    # --- SSL Configuration (managed by Certbot) ---
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Frontend static files ---
    root /opt/cineworld/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API: Catalog Service (port 8001) ---
    location /api/catalog/ {
        proxy_pass http://catalog_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: OTP Service (port 8002) ---
    location /api/otp/ {
        proxy_pass http://otp_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Identity Service (port 8003) ---
    location /api/identity/ {
        proxy_pass http://identity_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Booking Service (port 8004) ---
    location /api/booking/ {
        proxy_pass http://booking_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Payment Service (port 8005) ---
    location /api/payment/ {
        proxy_pass http://payment_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Redemption Service (port 8006) ---
    location /api/redemption/ {
        proxy_pass http://redemption_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Management Service (port 8007) ---
    location /api/management/ {
        proxy_pass http://management_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- File uploads ---
    location /uploads/ {
        alias /opt/cineworld/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Static assets caching ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
    }
}
