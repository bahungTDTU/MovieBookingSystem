<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-main);
        }
        .auth-container { width: 100%; max-width: 400px; padding: 20px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2 style="text-align: center; margin-top: 0;">Quên Mật Khẩu?</h2>
            <p style="text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 30px;">
                Nhập email của bạn để nhận mã xác thực đặt lại mật khẩu.
            </p>
            
            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">EMAIL</label>
                <input type="text" id="forgot-email" placeholder="name@example.com">
            </div>

            <button class="btn" style="width: 100%;" onclick="requestOTP()">GỬI MÃ OTP</button>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="login.html" style="color: var(--text-sub); font-size: 14px; text-decoration: none;">← Quay lại Đăng nhập</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
