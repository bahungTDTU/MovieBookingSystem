<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-main);
        }
        .auth-container { width: 100%; max-width: 400px; padding: 20px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px;">Mật Khẩu Mới</h2>
            
            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">EMAIL</label>
                <input type="text" id="reset-email" readonly style="background: #111; color: #666; border-color: #222;">
            </div>

            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">MÃ OTP</label>
                <input type="text" id="reset-otp" placeholder="Mã 6 số từ email">
            </div>

            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">MẬT KHẨU MỚI</label>
                <input type="password" id="reset-new-pass" placeholder="••••••••">
            </div>

            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="confirmReset()">CẬP NHẬT MẬT KHẨU</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById("reset-email").value = params.get("email") || "";
    </script>
</body>
</html>
