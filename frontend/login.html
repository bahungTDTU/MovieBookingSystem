<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CineWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('https://image.tmdb.org/t/p/original/xOMo8BRK7PfcJv9JCnx7s5hj0PX.jpg') no-repeat center center/cover;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: -1;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .brand-logo {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }
        .form-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-sub);
        }
        .form-link a {
            color: var(--accent);
            font-weight: bold;
        }
        .form-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">CINE<span style="color:white">WORLD</span>.</div>
        
        <div class="auth-box">
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px;">Đăng Nhập</h2>
            
            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">EMAIL</label>
                <input type="text" id="email" placeholder="name@example.com">
            </div>
            
            <div class="form-group">
                <label style="font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: block;">MẬT KHẨU</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="login()">ĐĂNG NHẬP</button>
            
            <div class="form-link">
                <a href="forgot-password.html">Quên mật khẩu?</a>
            </div>
            
            <div class="form-link" style="border-top: 1px solid #333; padding-top: 20px;">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
